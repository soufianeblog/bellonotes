name: bellonotes
description: "Bello Notes — a cross-platform notes app at bellocloud.com"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_markdown: ^0.7.7
  flutter_quill: ^11.5.1
  flutter_quill_delta_from_html: ^1.5.3
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  archive: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

flutter:
  uses-material-design: true
