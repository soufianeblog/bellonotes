name: bellonotes
description: "Bello Notes — a cross-platform notes app at bellocloud.com"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.4.2
  sqflite_common: ^2.5.4
  sqflite_common_ffi: ^2.3.4+4
  path_provider: ^2.1.5
  path: ^1.9.1
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_markdown: ^0.7.7
  flutter_quill: ^11.5.1
  flutter_quill_delta_from_html: ^1.5.3
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  url_launcher: ^6.3.1
  archive: ^4.0.2
  sqflite_common_ffi_web: ^1.1.2
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

# App launcher icons for every platform, generated from resources/logo/.
# Regenerate after changing the artwork with:
#   dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "resources/logo/logo.png"
  # Android: legacy mipmaps + adaptive icon (padded foreground on white).
  android: "ic_launcher"
  min_sdk_android: 21
  # Brand-yellow background so the white note card stands out inside the
  # launcher mask (the generated XML insets the full-bleed artwork 16% so the
  # whole notepad stays visible and centered).
  adaptive_icon_background: "#F5A623"
  adaptive_icon_foreground: "resources/logo/logo.png"
  # iOS rejects an alpha channel — flatten it onto white.
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: true
    image_path: "resources/logo/logo.png"
    background_color: "#FFFFFF"
    theme_color: "#F5A623"
  windows:
    generate: true
    image_path: "resources/logo/logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "resources/logo/logo.png"
